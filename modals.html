<!-- Apply Now Modal -->
<div class="modal fade" id="applyModal" tabindex="-1" aria-labelledby="applyModalLabel" aria-hidden="true" role="dialog" aria-modal="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content premium-modal border-0">
            <div class="modal-body">
                <div class="modal-branding text-center mb-3">
                    <h1 class="modal-brand-name">DENAHALAYA</h1>
                    <p class="modal-brand-tagline">Institute of Formation, Punnapra</p>
                    <p class="modal-form-badge">APPLICATION FORM</p>
                    <div class="modal-header-divider"></div>
                    <h2 class="modal-main-title">Denahalaya Course Application</h2>
                </div>
                <button type="button" class="btn-close position-absolute top-0 end-0 m-3" data-bs-dismiss="modal" aria-label="Close"></button>

                <form id="applicationFormGlobal" class="premium-form mt-2">
                    <!-- NAME -->
                    <div class="form-group">
                        <input type="text" name="name" class="form-control" placeholder=" " autocomplete="name" required>
                        <label>Applicant's Full Name *</label>
                    </div>

                    <div class="row g-2">
                        <!-- AGE -->
                        <div class="col-md-4">
                            <div class="form-group">
                                <input type="number" name="age" class="form-control" placeholder=" " min="15" max="100" required>
                                <label>Age *</label>
                            </div>
                        </div>
                        <!-- EMAIL -->
                        <div class="col-md-8">
                            <div class="form-group">
                                <input type="email" name="email" class="form-control" placeholder=" " autocomplete="email" required>
                                <label>Email Address *</label>
                            </div>
                        </div>
                    </div>

                    <!-- ADDRESS -->
                    <div class="form-group">
                        <textarea name="address" class="form-control" placeholder=" " rows="2" required></textarea>
                        <label>Contact Address *</label>
                    </div>

                    <!-- COURSE SELECTION (Floating Label) -->
                    <div class="form-group">
                        <select name="course" class="form-select custom-select" required>
                            <option value="" disabled selected></option>
                            <option value="One-Year Diploma in Formative Spirituality & Pastoral Counselling">One-Year Diploma in Formative Spirituality & Pastoral Counselling</option>
                            <option value="Two-Year Master’s Programme in Clinical Psychology (IGNOU)">Two-Year Master’s Programme in Clinical Psychology (IGNOU)</option>
                            <option value="One-Year Diploma in Psycho-Spiritual Integration (Junior Sisters)">One-Year Diploma in Psycho-Spiritual Integration (Junior Sisters)</option>
                            <option value="One-Year Diploma in Psycho-Spiritual Renewal">One-Year Diploma in Psycho-Spiritual Renewal</option>
                            <option value="Three-Month Certificate Programme in Motivational & Psychological Assessment">Three-Month Certificate Programme in Motivational & Psychological Assessment</option>
                            <option value="Three-week Formators’ Short Course">Three-week Formators’ Short Course</option>
                            <option value="B.Sc. Psychology Plus Psycho-Spiritual Integration">B.Sc. Psychology Plus Psycho-Spiritual Integration</option>
                            <option value="M.Sc. Counselling Psychology Plus Psycho-Spiritual Integration">M.Sc. Counselling Psychology Plus Psycho-Spiritual Integration</option>
                        </select>
                        <label>Select Your Course *</label>
                    </div>

                    <div class="row g-2">
                        <!-- PIN -->
                        <div class="col-md-5">
                            <div class="form-group">
                                <input type="text" name="pin" class="form-control" placeholder=" " autocomplete="postal-code" inputmode="numeric" pattern="[0-9]{6}" title="Please enter a 6-digit pin code" required>
                                <label>Pin Code *</label>
                            </div>
                        </div>
                        <!-- PHONE -->
                        <div class="col-md-7">
                            <div class="form-group">
                                <input type="tel" name="phone" class="form-control" placeholder=" " autocomplete="tel" inputmode="tel" pattern="[0-9]{10,12}" title="Please enter a valid phone number" required>
                                <label>Phone Number *</label>
                            </div>
                        </div>
                    </div>

                    <!-- DIOCESE -->
                    <div class="form-group">
                        <input type="text" name="diocese" class="form-control" placeholder=" " required>
                        <label>Diocese / Congregation *</label>
                    </div>

                    <!-- QUALIFICATION -->
                    <div class="form-group">
                        <input type="text" name="qualification" class="form-control" placeholder=" " required>
                        <label>Highest Qualification *</label>
                    </div>

                    <!-- APOSTOLATE -->
                    <div class="form-group">
                        <input type="text" name="apostolate" class="form-control" placeholder=" " required>
                        <label>Present Apostolate / Ministry *</label>
                    </div>

                    <!-- REASON -->
                    <div class="form-group">
                        <textarea name="reason" class="form-control" placeholder=" " rows="2" required></textarea>
                        <label>Reason for attending this course *</label>
                    </div>
                    
                    <button type="submit" class="btn-custom btn-submit-premium w-100 mt-2">
                        Submit Application
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Dynamic Course Detail Modal -->
<div class="modal fade" id="courseDetailsModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content border-0 shadow-lg" style="border-radius: 20px;">
            <div class="modal-body p-4 p-md-5">
                <button type="button" class="btn-close position-absolute top-0 end-0 m-4" data-bs-dismiss="modal" aria-label="Close"></button>
                
                <div id="courseModalContent">
                    <span class="badge bg-gold-soft text-navy mb-2 px-3 py-2 rounded-pill" id="modalCourseTagline"></span>
                    <h2 id="modalCourseTitle" style="color: #2e7d32; font-weight: 700; font-family: 'Playfair Display', serif; margin-bottom: 5px;"></h2>
                    <p class="text-muted small mb-4" id="modalCourseDuration"><i class="far fa-calendar-alt me-2"></i></p>
                    
                    <div class="divider mb-4" style="height: 2px; width: 60px; background: #2e7d32; border-radius: 2px;"></div>
                    
                    <div class="course-description mb-4" id="modalCourseBody" style="font-size: 1.05rem; line-height: 1.7; color: #444;">
                        <!-- Content injected via JS -->
                    </div>

                    <div class="d-flex flex-column flex-sm-row gap-3 mt-5">
                        <a href="#" class="btn-custom btn-primary-custom flex-grow-1 py-3" data-bs-toggle="modal" data-bs-target="#applyModal">
                            Apply Now
                        </a>
                        <button class="btn-custom btn-outline-navy-custom flex-grow-1 py-3" data-bs-dismiss="modal">
                            Close Details
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
