<!-- Apply Now Modal -->
<div class="modal fade" id="applyModal" tabindex="-1" aria-labelledby="applyModalLabel" aria-hidden="true" role="dialog" aria-modal="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
            <div class="modal-header border-0 flex-column align-items-center pt-4 pb-0 position-relative">
                <button type="button" class="btn-close position-absolute top-0 end-0 m-3" data-bs-dismiss="modal" aria-label="Close" style="filter: none;"></button>
                <div class="text-center w-100">
                    <h1 class="brand-title-modal mb-1">DENAHALAYA</h1>
                    <p class="brand-subtitle-modal mb-0">Institute of Formation, Punnapra</p>
                    <p class="course-short-title mb-3">ONE MONTH SHORT COURSE FOR FORMATORS</p>
                    <div class="app-form-box mx-auto mb-3">
                        <span>APPLICATION FORM</span>
                    </div>
                    <hr class="modal-divider mx-5 my-2">
                </div>
            </div>
            <div class="modal-body p-3 p-md-4 pt-1">
                <div class="text-center mb-3">
                    <h2 class="app-main-heading mb-0">Denahalaya Course Application</h2>
                </div>
                <form id="applicationFormGlobal">
                    <select name="course" class="form-select mb-3" required>
                        <option value="" selected disabled>-- Select Course * --</option>
                        <option value="One-Year Diploma in Formative Spirituality & Pastoral Counselling">One-Year Diploma in Formative Spirituality & Pastoral Counselling</option>
                        <option value="Two-Year Master’s Programme in Clinical Psychology (IGNOU)">Two-Year Master’s Programme in Clinical Psychology (IGNOU)</option>
                        <option value="B.Sc. Psychology Plus Psycho-Spiritual Integration">B.Sc. Psychology Plus Psycho-Spiritual Integration</option>
                        <option value="M.Sc. Counselling Psychology Plus Psycho-Spiritual Integration">M.Sc. Counselling Psychology Plus Psycho-Spiritual Integration</option>
                        <option value="Pastoral Counselling (Junior Sisters)">Pastoral Counselling (Junior Sisters)</option>
                        <option value="Pastoral Counselling (Religious Sisters & Priests)">Pastoral Counselling (Religious Sisters & Priests)</option>
                        <option value="Three-Month Certificate Programme">Three-Month Certificate Programme</option>
                        <option value="Three-week Formators’ Short Course">Three-week Formators’ Short Course</option>
                    </select>
                    <input type="text" name="name" class="form-control" placeholder="Applicant's Name" autocomplete="name" required>
                    <input type="number" name="age" class="form-control" placeholder="Age" required>
                    <input type="email" name="email" class="form-control" placeholder="Email Address" autocomplete="email" required>
                    <textarea name="address" class="form-control" placeholder="Contact Address" rows="2" required></textarea>
                    <input type="text" name="pin" class="form-control" placeholder="Pin" autocomplete="postal-code" inputmode="numeric" required>
                    <input type="tel" name="phone" class="form-control" placeholder="Phone" autocomplete="tel" inputmode="tel" required>
                    <input type="text" name="diocese" class="form-control" placeholder="Diocese / Congregation">
                    <input type="text" name="qualification" class="form-control" placeholder="Highest Qualification">
                    <input type="text" name="apostolate" class="form-control" placeholder="Present Apostolate / Ministry">
                    <textarea name="reason" class="form-control" placeholder="Reason for attending this course" rows="2"></textarea>
                    
                    <button type="submit" class="btn-custom btn-primary-custom w-100 mt-2">
                        Submit Application
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
