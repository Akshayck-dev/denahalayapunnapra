<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Denahalaya Institute</title>
    <link rel="stylesheet" href="./assets/css/bootstrap.css?v=7.0">
    <link rel="stylesheet" href="./assets/css/main.css?v=7.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
</head>
<body>

    <div class="wrapper">
        <header data-include="header"></header>

        <!-- Banner -->
        <section class="subpage-banner">
            <div class="container" data-aos="fade-up">
                <h1>Contact Us</h1>
                <p class="text-white-50">Reach out for enquiries and admissions</p>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb justify-content-center mb-0">
                        <li class="breadcrumb-item"><a href="index.html">Home</a></li>
                        <li class="breadcrumb-item active" aria-current="page">Contact</li>
                    </ol>
                </nav>
            </div>
        </section>

        <!-- Modern Glassmorphism Contact Section -->
        <section class="contact-section">
          <div class="container" data-aos="zoom-out">
            
            <div class="glass-panel">
                
                <!-- Breadcrumb -->
                <div class="contact-breadcrumb">
                    <a href="index.html" style="color: inherit; text-decoration: none;">HOME</a> / <span class="active">CONTACT</span>
                </div>

                <div class="row g-5">
            
                  <!-- LEFT: INFO -->
                  <div class="col-lg-5">
                    <div class="contact-info-glass">
                      <h3>Get in Touch</h3>
                      
                      <p><i class="fas fa-phone-alt"></i> <a href="tel:+916282525648" style="color: inherit; text-decoration: none;">+91 6282 525 648</a></p>
                      <p><i class="fas fa-phone"></i> <a href="tel:04772287808" style="color: inherit; text-decoration: none;">0477 228 7808</a></p>
                      <p><i class="fas fa-envelope"></i> <a href="mailto:danahalaya@gmail.com" style="color: inherit; text-decoration: none;">danahalaya@gmail.com</a></p>
                      <p><i class="fas fa-map-marker-alt"></i> Punnapra, Alappuzha, Kerala - 688004</p>
                      <p><i class="fab fa-whatsapp"></i> <a href="https://wa.me/916282525648" style="color: inherit; text-decoration: none;">Chat on WhatsApp</a></p>

                    </div>
                  </div>
            
                  <!-- RIGHT: FORM -->
                  <div class="col-lg-7">
                    <div class="contact-form-glass">
            
                      <h5>Send a Message</h5>
            
                      <form id="contactForm">
            
                        <input type="text" placeholder="Full Name" id="name" required>
                        <input type="email" placeholder="Email Address" id="email" required>
                        <input type="text" placeholder="Phone Number" id="phone" required>
                        <input type="text" placeholder="Subject" id="subject">
                        <textarea placeholder="Your message..." id="message" required></textarea>
            
                        <button type="submit" class="btn-whatsapp-glass">Send Message via WhatsApp</button>
            
                      </form>
            
                    </div>
                  </div>
            
                </div>
            </div>

            <!-- Map (Matching Greyscale Design) -->
            <div class="mt-5 glass-panel" style="padding: 10px !important; border-radius: 20px !important; filter: grayscale(1) invert(0.1); opacity: 0.7;">
                <iframe width="100%" height="400" style="border:0; border-radius: 12px;" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d15730.0!2d76.32!3d9.43!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zOcKwMjUnNDguMCJOIDc2wrAxOScxMi4wIkU!5e0!3m2!1sen!2sin!4v1717171717171" allowfullscreen="" loading="lazy"></iframe>
            </div>

          </div>
        </section>

        <footer data-include="footer"></footer>
    </div>

    <script src="./assets/js/jquery.js"></script>
    <script src="./assets/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <script src="./assets/js/app.js?v=7.0"></script>
    <script>
        AOS.init({ duration: 1000, once: true });

        document.getElementById("contactForm").addEventListener("submit", function(e) {
            e.preventDefault();

            const name = document.getElementById("name").value;
            const email = document.getElementById("email").value;
            const phone = document.getElementById("phone").value;
            const subject = document.getElementById("subject").value;
            const message = document.getElementById("message").value;

            const text = `Hello Denahalaya,%0A
New Enquiry Details,%0A
Name: ${name}%0A
Email: ${email}%0A
Phone: ${phone}%0A
Subject: ${subject}%0A
Message: ${message}`;

            const phoneNumber = "916282525648";
            const whatsappUrl = `https://wa.me/${phoneNumber}?text=${encodeURIComponent(text)}`;

            window.open(whatsappUrl, "_blank");
        });
    </script>
    <div data-include="modals"></div>
</body>
</html>
