<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Denahalaya Institute</title>
    <link rel="stylesheet" href="./assets/css/bootstrap.css?v=3.1">
    <link rel="stylesheet" href="./assets/css/main.css?v=3.1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
</head>
<body>

    <div class="wrapper">
        <header data-include="header"></header>

        <!-- Banner -->
        <section class="subpage-banner">
            <div class="container" data-aos="fade-up">
                <h1>Contact Us</h1>
                <p class="text-white-50">Reach out for enquiries and admissions</p>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb justify-content-center mb-0">
                        <li class="breadcrumb-item"><a href="index.html">Home</a></li>
                        <li class="breadcrumb-item active" aria-current="page">Contact</li>
                    </ol>
                </nav>
            </div>
        </section>

        <!-- Contact Section -->
        <section class="contact-page-optimized">
            <div class="container">
                <div class="contact-wrapper">
                    <!-- Contact Info Sidebar -->
                    <div class="contact-info" data-aos="fade-right">
                        <h3>Get in Touch</h3>
                        
                        <div class="item">
                            <i class="fas fa-mobile-alt"></i>
                            <a href="tel:+916282525648">+91 6282 525 648</a>
                        </div>

                        <div class="item">
                            <i class="fas fa-phone"></i>
                            <a href="tel:04772287808">0477 228 7808</a>
                        </div>

                        <div class="item">
                            <i class="fas fa-envelope"></i>
                            <a href="mailto:danahalaya@gmail.com">danahalaya@gmail.com</a>
                        </div>

                        <div class="item">
                            <i class="fas fa-map-marker-alt"></i>
                            <span>Punnapra, Alappuzha, Kerala - 688004</span>
                        </div>

                        <div class="item">
                            <i class="fab fa-whatsapp"></i>
                            <a href="https://wa.me/916282525648">Chat on WhatsApp</a>
                        </div>

                        <hr style="margin: 25px 0; border-color: #eee;">
                        
                        <div class="follow-us">
                            <h5 style="font-size: 13px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; color: #888;">Follow Us</h5>
                            <div style="display: flex; gap: 10px;">
                                <a href="#" style="width: 34px; height: 34px; border-radius: 50%; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; color: #002147; transition: 0.3s;"><i class="fab fa-facebook-f" style="font-size: 14px;"></i></a>
                                <a href="#" style="width: 34px; height: 34px; border-radius: 50%; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; color: #002147; transition: 0.3s;"><i class="fab fa-instagram" style="font-size: 14px;"></i></a>
                                <a href="#" style="width: 34px; height: 34px; border-radius: 50%; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; color: #002147; transition: 0.3s;"><i class="fab fa-youtube" style="font-size: 14px;"></i></a>
                            </div>
                        </div>
                    </div>

                    <!-- Contact Form -->
                    <div class="contact-form" data-aos="fade-left">
                        <h3>Send a Message</h3>
                        <form id="contactForm">
                            <div class="form-row">
                                <div style="flex: 1;">
                                    <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px;">Full Name</label>
                                    <input type="text" id="name" placeholder="Enter your name" required>
                                </div>
                                <div style="flex: 1;">
                                    <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px;">Email Address</label>
                                    <input type="email" id="email" placeholder="Enter your email" required>
                                </div>
                            </div>
                            
                            <div class="form-row">
                                <div style="flex: 1;">
                                    <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px;">Phone Number</label>
                                    <input type="tel" id="phone" placeholder="Your phone number" required>
                                </div>
                                <div style="flex: 1;">
                                    <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px;">Subject</label>
                                    <input type="text" id="subject" placeholder="What is this about?" required>
                                </div>
                            </div>

                            <div style="margin-bottom: 10px;">
                                <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px;">Message</label>
                                <textarea id="message" placeholder="Write your message here..." required></textarea>
                            </div>

                            <button type="submit">Send Message via WhatsApp</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>

                <!-- Map -->
                <div class="mt-5 rounded overflow-hidden shadow" data-aos="fade-up">
                    <iframe width="100%" height="450" style="border:0;" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d15730.0!2d76.32!3d9.43!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zOcKwMjUnNDguMCJOIDc2wrAxOScxMi4wIkU!5e0!3m2!1sen!2sin!4v1717171717171" allowfullscreen="" loading="lazy"></iframe>
                </div>
            </div>
        </section>

        <footer data-include="footer"></footer>
    </div>

    <script src="./assets/js/jquery.js"></script>
    <script src="./assets/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <script src="./assets/js/app.js?v=3.1"></script>
    <script>
        AOS.init({ duration: 1000, once: true });

        document.getElementById("contactForm").addEventListener("submit", function(e) {
            e.preventDefault();
            const name = document.getElementById("name").value;
            const email = document.getElementById("email").value;
            const phone = document.getElementById("phone").value;
            const subject = document.getElementById("subject").value;
            const message = document.getElementById("message").value;

            const text = `Hello Denahalaya…%0ANew Enquiry Details,%0AName: ${encodeURIComponent(name)}%0AEmail: ${encodeURIComponent(email)}%0APhone: ${encodeURIComponent(phone)}%0ASubject: ${encodeURIComponent(subject)} %0AMessage: ${encodeURIComponent(message)}`;
            const phoneNumber = "916282525648";
            const whatsappUrl = `https://wa.me/${phoneNumber}?text=${text}`;
            window.open(whatsappUrl, "_blank");
        });
    </script>
    <div data-include="modals"></div>
</body>
</html>
