<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Denahalaya Institute</title>
    <link rel="stylesheet" href="./assets/css/bootstrap.css">
    <link rel="stylesheet" href="./assets/css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
</head>
<body>

    <div class="wrapper">
        <header data-include="header"></header>

        <!-- Banner -->
        <section class="subpage-banner">
            <div class="container" data-aos="fade-up">
                <h1>Contact Us</h1>
                <p class="text-white-50">Reach out for enquiries and admissions</p>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb justify-content-center mb-0">
                        <li class="breadcrumb-item"><a href="index.html">Home</a></li>
                        <li class="breadcrumb-item active" aria-current="page">Contact</li>
                    </ol>
                </nav>
            </div>
        </section>

        <!-- Contact Section -->
        <section class="section bg-white">
            <div class="container">
                <div class="row g-5">
                    <div class="col-lg-4" data-aos="fade-right">
                        <div class="card-modern">
                            <h4 class="display-font text-gold mb-4">Get in Touch</h4>
                            
                            <div class="contact-info-premium">
                                <div class="contact-item">
                                    <i class="fas fa-mobile-alt"></i>
                                    <a href="tel:+916282525648">+91 6282 525 648</a>
                                </div>

                                <div class="contact-item">
                                    <i class="fas fa-phone"></i>
                                    <a href="tel:04772287808">0477 228 7808</a>
                                </div>

                                <div class="contact-item">
                                    <i class="fas fa-envelope"></i>
                                    <a href="mailto:danahalaya@gmail.com">danahalaya@gmail.com</a>
                                </div>

                                <div class="contact-item">
                                    <i class="fas fa-map-marker-alt"></i>
                                    <span>Punnapra, Alappuzha, Kerala - 688004</span>
                                </div>

                                <div class="contact-item">
                                    <i class="fab fa-whatsapp"></i>
                                    <a href="https://wa.me/916282525648" target="_blank">Chat on WhatsApp</a>
                                </div>
                            </div>

                            <hr class="my-4">
                            <div class="mt-2">
                                <h5 class="small text-uppercase ls-2 mb-3">Follow Us</h5>
                                <div class="d-flex gap-2">
                                    <a href="#" class="btn-custom btn-social-small btn-outline-navy-custom rounded-circle" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
                                    <a href="#" class="btn-custom btn-social-small btn-outline-navy-custom rounded-circle" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
                                    <a href="#" class="btn-custom btn-social-small btn-outline-navy-custom rounded-circle" aria-label="YouTube"><i class="fab fa-youtube"></i></a>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-lg-8" data-aos="fade-left">
                        <div class="card-modern shadow-lg">
                            <h3 class="mb-4 display-font">Send a Message</h3>
                            <form id="contactForm">
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label class="form-label small fw-bold">Full Name</label>
                                        <input type="text" class="form-control" id="name" placeholder="Enter your name" autocomplete="name" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label small fw-bold">Email Address</label>
                                        <input type="email" class="form-control" id="email" placeholder="Enter your email" autocomplete="email" spellcheck="false" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label small fw-bold">Phone Number</label>
                                        <input type="tel" class="form-control" id="phone" placeholder="Your phone number" autocomplete="tel" inputmode="tel" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label small fw-bold">Subject</label>
                                        <input type="text" class="form-control" id="subject" placeholder="What is this about?" required>
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label small fw-bold">Message</label>
                                        <textarea class="form-control" id="message" rows="5" placeholder="Share your enquiry with us" required></textarea>
                                    </div>
                                    <div class="col-12 text-center mt-4">
                                        <button type="submit" class="btn-custom btn-primary-custom w-100">Send Message <i class="fas fa-paper-plane ms-2" aria-hidden="true"></i></button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- Map -->
                <div class="mt-5 rounded overflow-hidden shadow" data-aos="fade-up">
                    <iframe width="100%" height="450" style="border:0;" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d15730.0!2d76.32!3d9.43!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zOcKwMjUnNDguMCJOIDc2wrAxOScxMi4wIkU!5e0!3m2!1sen!2sin!4v1717171717171" allowfullscreen="" loading="lazy"></iframe>
                </div>
            </div>
        </section>

        <footer data-include="footer"></footer>
    </div>

    <script src="./assets/js/jquery.js"></script>
    <script src="./assets/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <script src="./assets/js/app.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });

        document.getElementById("contactForm").addEventListener("submit", function(e) {
            e.preventDefault();
            const name = document.getElementById("name").value;
            const email = document.getElementById("email").value;
            const phone = document.getElementById("phone").value;
            const subject = document.getElementById("subject").value;
            const message = document.getElementById("message").value;

            const text = `Hello Denahalaya…%0ANew Enquiry Details,%0AName: ${encodeURIComponent(name)}%0AEmail: ${encodeURIComponent(email)}%0APhone: ${encodeURIComponent(phone)}%0ASubject: ${encodeURIComponent(subject)} %0AMessage: ${encodeURIComponent(message)}`;
            const phoneNumber = "916282525648";
            const whatsappUrl = `https://wa.me/${phoneNumber}?text=${text}`;
            window.open(whatsappUrl, "_blank");
        });
    </script>
    <div data-include="modals"></div>
</body>
</html>
