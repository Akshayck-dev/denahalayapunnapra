<!DOCTYPE html>
<html lang="en">
<head>

<body>

    <div class="wrapper">

        <!-- Banner -->
        <section class="subpage-banner">

                    </ol>
                </nav>
            </div>
        </section>

        <!-- User Provided Contact Section -->
        <section class="contact-section-new py-5">
            <div class="contact-container">
            
              <!-- LEFT -->
              <div class="contact-info" data-aos="fade-right">
                <h2>Get in Touch</h2>
            
                <div class="item"><i class="fas fa-phone"></i> <a href="tel:+916282525648" style="color: inherit; text-decoration: none;">+91 6282 525 648</a></div>
                <div class="item"><i class="fas fa-phone-alt"></i> <a href="tel:04772287808" style="color: inherit; text-decoration: none;">0477 228 7808</a></div>
                <div class="item"><i class="fas fa-envelope"></i> <a href="mailto:danahalaya@gmail.com" style="color: inherit; text-decoration: none;">danahalaya@gmail.com</a></div>
                <div class="item"><i class="fas fa-map-marker-alt"></i> <span>Punnapra, Alappuzha, Kerala - 688004</span></div>
                <div class="item"><i class="fab fa-whatsapp"></i> <a href="https://wa.me/916282525648" style="color: inherit; text-decoration: none;">Chat on WhatsApp</a></div>
            
                <div class="social">
                  <a href="#" style="color: inherit;"><i class="fab fa-facebook"></i></a>
                  <a href="#" style="color: inherit;"><i class="fab fa-instagram"></i></a>
                  <a href="#" style="color: inherit;"><i class="fab fa-youtube"></i></a>
                </div>
              </div>
            
              <!-- RIGHT -->
              <div class="contact-form" data-aos="fade-left">
                <h2>Send a Message</h2>
            
                <form id="contactForm">
                  <input type="text" id="name" placeholder="Full Name" required>
                  <input type="email" id="email" placeholder="Email Address" required>
                  <input type="text" id="phone" placeholder="Phone Number" required>
                  <input type="text" id="subject" placeholder="Subject">
                  <textarea id="message" placeholder="Your message..." required></textarea>
            
                  <button type="submit">Send Message via WhatsApp</button>
                </form>
              </div>
            
            </div>
            
            <!-- Map (Kept outside container for full width feel) -->
            <div class="container mt-5">
                <div class="rounded overflow-hidden shadow" data-aos="fade-up">
                    <iframe width="100%" height="450" style="border:0;" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d15730.0!2d76.32!3d9.43!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zOcKwMjUnNDguMCJOIDc2wrAxOScxMi4wIkU!5e0!3m2!1sen!2sin!4v1717171717171" allowfullscreen="" loading="lazy"></iframe>

        </section>

                <!-- Map -->
                <div class="mt-5 rounded overflow-hidden shadow" data-aos="fade-up">
                    <iframe width="100%" height="450" style="border:0;" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d15730.0!2d76.32!3d9.43!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zOcKwMjUnNDguMCJOIDc2wrAxOScxMi4wIkU!5e0!3m2!1sen!2sin!4v1717171717171" allowfullscreen="" loading="lazy"></iframe>
                </div>
            </div>
        </section>

        <footer data-include="footer"></footer>
    </div>

    <script src="./assets/js/jquery.js"></script>
    <script src="./assets/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <script src="./assets/js/app.js?v=5.0"></script>
    <script>
        AOS.init({ duration: 1000, once: true });

        document.getElementById("contactForm").addEventListener("submit", function(e) {
            e.preventDefault();
            const name = document.getElementById("name").value;
            const email = document.getElementById("email").value;
            const phone = document.getElementById("phone").value;
            const subject = document.getElementById("subject").value;
            const message = document.getElementById("message").value;

            const text = `Hello Denahalaya…%0ANew Enquiry Details,%0AName: ${encodeURIComponent(name)}%0AEmail: ${encodeURIComponent(email)}%0APhone: ${encodeURIComponent(phone)}%0ASubject: ${encodeURIComponent(subject)} %0AMessage: ${encodeURIComponent(message)}`;
            const phoneNumber = "916282525648";
            const whatsappUrl = `https://wa.me/${phoneNumber}?text=${text}`;
            window.open(whatsappUrl, "_blank");
        });
    </script>
    <div data-include="modals"></div>
</body>
</html>
