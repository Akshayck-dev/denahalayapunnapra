<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Denahalaya Institute</title>
    <link rel="stylesheet" href="./assets/css/bootstrap.css?v=2.0">
    <link rel="stylesheet" href="./assets/css/main.css?v=2.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/css/lightbox.min.css">
    <style>
        .gallery-item {
            overflow: hidden;
            border-radius: 8px;
            cursor: pointer;
        }
        .gallery-item img {
            transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .gallery-item:hover img {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <header data-include="header"></header>

        <!-- Banner -->
        <section class="subpage-banner">
            <div class="container" data-aos="fade-up">
                <h1>Our Gallery</h1>
                <p class="text-white-50">Visualizing life and formation at Denahalaya</p>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb justify-content-center mb-0">
                        <li class="breadcrumb-item"><a href="index.html">Home</a></li>
                        <li class="breadcrumb-item active" aria-current="page">Gallery</li>
                    </ol>
                </nav>
            </div>
        </section>

        <!-- Gallery Grid -->
        <section class="section bg-white">
            <div class="container">
                <div class="row g-4">
                    <div class="col-lg-4 col-md-6 col-12" data-aos="zoom-in">
                        <div class="gallery-item shadow-sm h-100">
                            <a href="./assets/images/denahalaya_building.jpg" data-lightbox="institute" data-title="Denahalaya Institute Building">
                                <img src="./assets/images/denahalaya_building.jpg" class="img-fluid w-100 h-100 object-fit-cover" alt="Denahalaya">
                            </a>
                        </div>
                    </div>
                    <div class="col-lg-4 col-md-6 col-12" data-aos="zoom-in" data-aos-delay="100">
                        <div class="gallery-item shadow-sm h-100">
                            <a href="./assets/images/denahalaya_slider1.jpg" data-lightbox="institute" data-title="Formation Programs">
                                <img src="./assets/images/denahalaya_slider1.jpg" class="img-fluid w-100 h-100 object-fit-cover" alt="Formation">
                            </a>
                        </div>
                    </div>
                    <div class="col-lg-4 col-md-6 col-12" data-aos="zoom-in" data-aos-delay="200">
                        <div class="gallery-item shadow-sm h-100">
                            <a href="./assets/images/ALLEPPEY.jpg" data-lightbox="institute" data-title="Spiritual Retreats">
                                <img src="./assets/images/ALLEPPEY.jpg" class="img-fluid w-100 h-100 object-fit-cover" alt=" Retreats">
                            </a>
                        </div>
                    </div>
                    <div class="col-lg-4 col-md-6 col-12" data-aos="zoom-in">
                        <div class="gallery-item shadow-sm h-100">
                            <a href="./assets/images/background.jpg" data-lightbox="institute" data-title="Campus Life">
                                <img src="./assets/images/background.jpg" class="img-fluid w-100 h-100 object-fit-cover" alt="Campus">
                            </a>
                        </div>
                    </div>
                    <div class="col-lg-4 col-md-6 col-12" data-aos="zoom-in" data-aos-delay="300">
                        <div class="gallery-item shadow-sm h-100">
                            <a href="./assets/images/about_classroom_1.jpg" data-lightbox="institute" data-title="Formation & Study Session">
                                <img src="./assets/images/about_classroom_1.jpg" class="img-fluid w-100 h-100 object-fit-cover" alt="Classroom Session 1">
                            </a>
                        </div>
                    </div>
                    <div class="col-lg-4 col-md-6 col-12" data-aos="zoom-in">
                        <div class="gallery-item shadow-sm h-100">
                            <a href="./assets/images/about_classroom_2.png" data-lightbox="institute" data-title="Academic Formation">
                                <img src="./assets/images/about_classroom_2.png" class="img-fluid w-100 h-100 object-fit-cover" alt="Classroom Session 2">
                            </a>
                        </div>
                    </div>
                    <div class="col-lg-4 col-md-6 col-12" data-aos="zoom-in" data-aos-delay="100">
                        <div class="gallery-item shadow-sm h-100">
                            <a href="./assets/images/about_classroom_3.jpg" data-lightbox="institute" data-title="Formation Community">
                                <img src="./assets/images/about_classroom_3.jpg" class="img-fluid w-100 h-100 object-fit-cover" alt="Classroom Session 3">
                            </a>
                        </div>
                    </div>
                </div>

            </div>
        </section>

        <footer data-include="footer"></footer>
    </div>

    <script src="./assets/js/jquery.js"></script>
    <script src="./assets/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/js/lightbox.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <script src="./assets/js/app.js?v=2.0"></script>
    <script>AOS.init({ duration: 1000, once: true });</script>
    <div data-include="modals"></div>
</body>
</html>
