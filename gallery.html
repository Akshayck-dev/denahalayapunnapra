        .gallery-item {
            overflow: hidden;
            border-radius: 12px;
            cursor: pointer;
            aspect-ratio: 4 / 3; /* Force uniform high-fidelity grid */
            position: relative;
            background: #f0f0f0;
        }
        .gallery-item img {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
            transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
            display: block;
        }
        .gallery-item:hover img {
            transform: scale(1.1);
        }
        /* Fancybox Premium Blur Effect */
        .fancybox__backdrop {
            background: rgba(0, 0, 0, 0.7) !important;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
    </style>
