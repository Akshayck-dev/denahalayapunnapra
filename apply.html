<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply Now | Denahalaya Institute</title>
    <link rel="stylesheet" href="./assets/css/bootstrap.css">
    <link rel="stylesheet" href="./assets/css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
</head>
<body>

    <div class="wrapper">
        <header data-include="header"></header>

        <!-- Banner -->
        <section class="subpage-banner">
            <div class="container" data-aos="fade-up">
                <h1>Apply Now</h1>
                <p class="text-white-50">Secure your place in our transformative academic programmes</p>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb justify-content-center mb-0">
                        <li class="breadcrumb-item"><a href="index.html">Home</a></li>
                        <li class="breadcrumb-item active" aria-current="page">Apply</li>
                    </ol>
                </nav>
            </div>
        </section>

        <!-- Application Form Section -->
        <section class="section bg-white">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-lg-8">
                        <div class="card-modern shadow-lg border-0 p-4 p-md-5" data-aos="fade-up">
                            <div class="text-center mb-5">
                                <h2 class="display-font text-navy">Online Application Form</h2>
                                <p class="text-muted">Please fill out the details below to register for your preferred course.</p>
                                <div class="ornament">✦ ✦ ✦</div>
                            </div>

                            <form id="applicationForm" class="row g-4">
                                <div class="col-md-12">
                                    <label class="form-label fw-bold">Select Programme *</label>
                                    <select name="program" class="form-select py-3" required>
                                        <option value="" selected disabled>Choose a program...</option>
                                        <option value="Formators' Diploma">Formators’ Diploma (One-Year)</option>
                                        <option value="Clinical Psychology Master's">Clinical Psychology Master’s (Two-Year)</option>
                                        <option value="Psycho-Spiritual Integration">Psycho-Spiritual Integration (One-Year)</option>
                                        <option value="Short Term Course">Short Term Intensive Courses</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Full Name *</label>
                                    <input type="text" name="name" class="form-control py-3" placeholder="Enter your full name" autocomplete="name" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Email Address *</label>
                                    <input type="email" name="email" class="form-control py-3" placeholder="Enter your email" autocomplete="email" spellcheck="false" required>
                                </div>
                                <div class="col-md-12">
                                    <label class="form-label fw-bold">Contact Address *</label>
                                    <textarea name="address" class="form-control py-3" placeholder="Full postal address" rows="3" required></textarea>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Phone Number *</label>
                                    <input type="tel" name="phone" class="form-control py-3" placeholder="Your phone number" autocomplete="tel" inputmode="tel" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Pin Code</label>
                                    <input type="text" name="pin" class="form-control py-3" placeholder="Postal pin code" autocomplete="postal-code" inputmode="numeric">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Diocese / Congregation</label>
                                    <input type="text" name="diocese" class="form-control py-3" placeholder="Your religious affiliation">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Highest Qualification</label>
                                    <input type="text" name="qualification" class="form-control py-3" placeholder="Your academic degree">
                                </div>
                                <div class="col-12">
                                    <label class="form-label fw-bold">Present Apostolate / Ministry</label>
                                    <textarea name="apostolate" class="form-control py-3" placeholder="Current role or ministry" rows="2"></textarea>
                                </div>
                                <div class="col-12">
                                    <label class="form-label fw-bold">Reason for applying</label>
                                    <textarea name="reason" class="form-control py-3" placeholder="Why do you wish to attend this course?" rows="3"></textarea>
                                </div>
                                <div class="col-12 text-center mt-5">
                                    <button type="submit" class="btn-gold px-5 py-3 fs-5">
                                        Submit My Application <i class="fas fa-paper-plane ms-2" aria-hidden="true"></i>
                                    </button>
                                    <p class="small text-muted mt-3 italic">* Required fields. We will contact you for further admission steps.</p>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <footer data-include="footer"></footer>
    </div>

    <script src="./assets/js/jquery.js"></script>
    <script src="./assets/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <script src="./assets/js/app.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });
        
        (function() { emailjs.init("RmgrNAAYbmB8BvIJ2"); })();

        document.getElementById("applicationForm").addEventListener("submit", function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;
                    btn.innerHTML = 'Submitting… <i class="fas fa-spinner fa-spin ms-2" aria-hidden="true"></i>';
            btn.disabled = true;

            emailjs.sendForm('service_2kwpecd', 'template_s32jb2z', this)
                .then(() => {
                    Swal.fire({
                        icon: 'success',
                        title: 'Success!',
                        text: 'Application submitted successfully! We will get back to you soon.',
                        confirmButtonColor: '#002147'
                    });
                    e.target.reset();
                })
                .catch(err => {
                    Swal.fire({
                        icon: 'error',
                        title: 'Submission Failed',
                        text: 'Failed to send application. Please check your connection and try again.',
                        confirmButtonColor: '#002147'
                    });
                })
                .finally(() => {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                });
        });
    </script>
</body>
</html>
